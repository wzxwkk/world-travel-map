<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>环球旅行学习地球 · World Travel Learning Globe</title>
<link rel="stylesheet" href="styles.css?v=6">
</head>
<body>
<header>
  <div class="brand">
    <span class="logo">🌏</span>
    <div>
      <h1 data-i18n="appTitle"></h1>
      <p data-i18n="subtitle"></p>
    </div>
  </div>
  <div class="controls">
    <input id="search" list="country-list" data-i18n-ph="searchPh" autocomplete="off">
    <datalist id="country-list"></datalist>
    <label><span data-i18n="uiLangLabel"></span>
      <select id="ui-lang">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="de">Deutsch</option>
        <option value="ru">Русский</option>
      </select>
    </label>
    <button id="home-btn" class="home-btn"></button>
  </div>
</header>
<main>
  <div id="map-wrap">
    <div id="map"></div>
    <div id="legend">
      <span><i class="sw-curated"></i><span data-i18n="legendCurated"></span></span>
      <span><i class="sw-dot"></i><span data-i18n="legendDot"></span></span>
    </div>
  </div>
  <aside id="panel"></aside>
</main>

<div id="welcome" class="overlay hidden">
  <div class="card">
    <div class="card-emoji">🌏</div>
    <h2 data-i18n="welcomeTitle"></h2>
    <label class="field"><span data-i18n="welcomeHome"></span>
      <input id="home-input" autocomplete="off">
      <div id="home-opts" class="opts hidden"></div>
    </label>
    <label class="field"><span data-i18n="welcomeLang"></span>
      <select id="welcome-lang">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="de">Deutsch</option>
        <option value="ru">Русский</option>
      </select>
    </label>
    <button id="start-btn" data-i18n="startBtn"></button>
  </div>
</div>

<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script src="https://unpkg.com/globe.gl"></script>
<script src="i18n.js?v=6"></script>
<script src="world.js?v=6"></script>
<script src="plugs.js?v=6"></script>
<script src="guide.js?v=6"></script>
<script src="visa.js?v=6"></script>
<script src="data.js?v=6"></script>
<script src="app.js?v=6"></script>
</body>
</html>
